version: "3.9"

# ============================================================
# Финансовый ассистент — полный стек
# ============================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file: .env
  networks:
    - backend

services:

  # ----------------------------------------------------------
  # Реверс-прокси и API Gateway
  # ----------------------------------------------------------
  traefik:
    image: traefik:v2.11
    container_name: finassist-traefik
    ports:
      - "8090:80"
      - "8453:443"
      - "8080:8080"       # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infrastructure/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - backend
      - frontend
    restart: unless-stopped

  # ----------------------------------------------------------
  # Базы данных
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: finassist-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finassist-redis
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # LLM Runtime — используем AIESA cloud API (без локального Ollama)
  # ----------------------------------------------------------

  # ----------------------------------------------------------
  # Очередь фоновых задач
  # ----------------------------------------------------------
  celery-worker:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
    container_name: finassist-celery-worker
    command: celery -A app.worker worker --loglevel=info --concurrency=4 -Q transactions,analytics,subscriptions
    <<: *service-defaults
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 300m
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  celery-beat:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
    container_name: finassist-celery-beat
    command: celery -A app.worker beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    <<: *service-defaults
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 150m
    depends_on:
      redis:
        condition: service_healthy

  # ----------------------------------------------------------
  # Фронтенд (Flutter PWA → nginx)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: finassist-frontend
    restart: unless-stopped
    networks:
      - backend
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # ----------------------------------------------------------
  # Микросервисы
  # strip-api middleware: снимает /api перед передачей в сервис
  # /api/auth/login → auth-service → /auth/login
  # ----------------------------------------------------------
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: finassist-auth
    <<: *service-defaults
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/auth`) || PathPrefix(`/api/users`)"
      - "traefik.http.routers.auth.middlewares=strip-api"
      - "traefik.http.routers.auth.priority=10"
      - "traefik.http.services.auth.loadbalancer.server.port=8001"

  transaction-service:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
    container_name: finassist-transactions
    <<: *service-defaults
    ports:
      - "8002:8002"
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transactions.rule=PathPrefix(`/api/transactions`)"
      - "traefik.http.routers.transactions.middlewares=strip-api"
      - "traefik.http.routers.transactions.priority=10"
      - "traefik.http.services.transactions.loadbalancer.server.port=8002"

  subscription-service:
    build:
      context: ./services/subscription-service
      dockerfile: Dockerfile
    container_name: finassist-subscriptions
    <<: *service-defaults
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.subscriptions.rule=PathPrefix(`/api/subscriptions`)"
      - "traefik.http.routers.subscriptions.middlewares=strip-api"
      - "traefik.http.routers.subscriptions.priority=10"
      - "traefik.http.services.subscriptions.loadbalancer.server.port=8004"

  investment-service:
    build:
      context: ./services/investment-service
      dockerfile: Dockerfile
    container_name: finassist-investments
    <<: *service-defaults
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.investments.rule=PathPrefix(`/api/investments`)"
      - "traefik.http.routers.investments.middlewares=strip-api"
      - "traefik.http.routers.investments.priority=10"
      - "traefik.http.services.investments.loadbalancer.server.port=8005"

  gamification-service:
    build:
      context: ./services/gamification-service
      dockerfile: Dockerfile
    container_name: finassist-gamification
    <<: *service-defaults
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gamification.rule=PathPrefix(`/api/gamification`)"
      - "traefik.http.routers.gamification.middlewares=strip-api"
      - "traefik.http.routers.gamification.priority=10"
      - "traefik.http.services.gamification.loadbalancer.server.port=8006"

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: finassist-notifications
    <<: *service-defaults
    ports:
      - "8007:8007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notifications.rule=PathPrefix(`/api/notifications`) || PathPrefix(`/ws`)"
      - "traefik.http.routers.notifications.middlewares=strip-api"
      - "traefik.http.routers.notifications.priority=10"
      - "traefik.http.services.notifications.loadbalancer.server.port=8007"

  receipt-service:
    build:
      context: ./services/receipt-service
      dockerfile: Dockerfile
    container_name: finassist-receipts
    <<: *service-defaults
    ports:
      - "8008:8008"
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.receipts.rule=PathPrefix(`/api/receipts`)"
      - "traefik.http.routers.receipts.middlewares=strip-api"
      - "traefik.http.routers.receipts.priority=10"
      - "traefik.http.services.receipts.loadbalancer.server.port=8008"

  llm-service:
    build:
      context: ./services/llm-service
      dockerfile: Dockerfile
    container_name: finassist-llm
    <<: *service-defaults
    ports:
      - "8009:8009"
    # Зависимостей нет — используем внешний AIESA API
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.llm.rule=PathPrefix(`/api/llm`)"
      - "traefik.http.routers.llm.middlewares=strip-api"
      - "traefik.http.routers.llm.priority=10"
      - "traefik.http.services.llm.loadbalancer.server.port=8009"

# ----------------------------------------------------------
# Сети
# ----------------------------------------------------------
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

# ----------------------------------------------------------
# Тома
# ----------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  uploads_data:
