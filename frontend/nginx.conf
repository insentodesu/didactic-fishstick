server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip — жмём JS/WASM/шрифты (главный вес первой загрузки)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm font/woff2 font/ttf application/font-sfnt
               application/octet-stream image/svg+xml;

    # Flutter PWA — все маршруты → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кеширование статики (включая ttf — кастомные шрифты Yandex Sans)
    location ~* \.(js|css|wasm|ttf|otf|png|jpg|gif|ico|woff2|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service Worker и bootstrap — не кешировать (иначе залипает старая версия)
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}
