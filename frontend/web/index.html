<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Простой и понятный трекер личных финансов.">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Финансы">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2A4D3E">

  <!-- Разрешение на камеру для сканирования QR -->
  <meta http-equiv="Permissions-Policy" content="camera=*">


  <title>Финансы</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; background: #F4F1EC; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #F4F1EC;
      font-family: -apple-system, sans-serif; color: #2A4D3E;
    }
    .spinner {
      width: 34px; height: 34px; border: 3px solid #2A4D3E33;
      border-top-color: #2A4D3E; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div></div>
  <script src="flutter_bootstrap.js" async></script>

  <!-- jsQR: QR-сканер для браузера -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>
    window._qrScanners = {};

    // initQrScanner: создаёт полноэкранный оверлей прямо на document.body.
    // Это обходит ограничения Flutter CanvasKit platform views на iOS Safari,
    // где видео-элемент внутри HtmlElementView не воспроизводится.
    window.initQrScanner = function(containerId, onResult, onError) {
      // Если оверлей уже есть — не дублируем
      if (document.getElementById('qr-body-overlay')) return;

      var overlay = document.createElement('div');
      overlay.id = 'qr-body-overlay';
      overlay.style.cssText = [
        'position:fixed',
        'top:0','left:0','right:0','bottom:0',
        'z-index:999999',
        'background:#000',
        'display:flex',
        'flex-direction:column',
        'align-items:center',
        'justify-content:center',
        '-webkit-user-select:none',
        'user-select:none',
      ].join(';') + ';';

      // Видео
      var video = document.createElement('video');
      video.setAttribute('playsinline', 'true');
      video.setAttribute('autoplay', 'true');
      video.setAttribute('muted', 'true');
      video.playsInline = true;
      video.muted = true;
      video.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:none;';

      var canvas = document.createElement('canvas');
      canvas.style.display = 'none';

      // Шапка с кнопкой закрыть
      var header = document.createElement('div');
      header.style.cssText = 'position:absolute;top:0;left:0;right:0;padding:16px 16px 0;display:flex;align-items:center;z-index:10;';
      var closeBtn = document.createElement('div');
      closeBtn.style.cssText = 'cursor:pointer;padding:8px;-webkit-tap-highlight-color:transparent;';
      closeBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>';
      var title = document.createElement('div');
      title.style.cssText = 'color:white;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:17px;font-weight:600;margin-left:8px;';
      title.textContent = 'Сканируйте QR чека';
      header.appendChild(closeBtn);
      header.appendChild(title);

      // Рамка прицела
      var aimBox = document.createElement('div');
      aimBox.style.cssText = 'position:absolute;width:220px;height:220px;border:3px solid white;border-radius:18px;top:50%;left:50%;transform:translate(-50%,-60%);pointer-events:none;z-index:5;display:none;';

      // Подсказка снизу
      var hint = document.createElement('div');
      hint.style.cssText = 'position:absolute;bottom:48px;left:24px;right:24px;background:rgba(0,0,0,0.65);border-radius:12px;padding:14px;text-align:center;z-index:5;display:none;';
      hint.innerHTML = '<span style="color:white;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;line-height:1.4;">Наведите камеру на QR-код в нижней части чека.</span>';

      // Кнопка "Включить камеру"
      var startBtn = document.createElement('div');
      startBtn.style.cssText = 'position:relative;z-index:10;text-align:center;cursor:pointer;padding:24px 32px;-webkit-tap-highlight-color:transparent;';
      startBtn.innerHTML =
        '<div style="width:88px;height:88px;background:rgba(255,255,255,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;border:2px solid rgba(255,255,255,0.3);">' +
          '<svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>' +
        '</div>' +
        '<div style="color:white;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:18px;font-weight:700;margin-bottom:12px;">Включить камеру</div>' +
        '<div style="color:rgba(255,255,255,0.55);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.5;max-width:260px;margin:0 auto;">Браузер запросит разрешение на доступ к камере</div>';

      overlay.appendChild(video);
      overlay.appendChild(canvas);
      overlay.appendChild(header);
      overlay.appendChild(aimBox);
      overlay.appendChild(hint);
      overlay.appendChild(startBtn);
      document.body.appendChild(overlay);

      var ctx = canvas.getContext('2d');
      var active = true;
      var found = false;

      window._qrScanners[containerId] = { stop: function() { active = false; }, stream: null, overlay: overlay };

      function removeOverlay() {
        active = false;
        var sc = window._qrScanners[containerId];
        if (sc && sc.stream) sc.stream.getTracks().forEach(function(t) { t.stop(); });
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
        delete window._qrScanners[containerId];
      }

      function startCamera() {
        startBtn.style.display = 'none';
        navigator.mediaDevices
          .getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
          })
          .then(function(stream) {
            if (!active) { stream.getTracks().forEach(function(t) { t.stop(); }); return; }
            window._qrScanners[containerId].stream = stream;
            video.srcObject = stream;
            var playPromise = video.play();
            if (playPromise !== undefined) {
              playPromise.catch(function(e) { console.warn('QR video play failed:', e); });
            }
            video.style.display = 'block';
            aimBox.style.display = 'block';
            hint.style.display = 'block';
            requestAnimationFrame(scan);
          })
          .catch(function(err) {
            startBtn.innerHTML =
              '<div style="font-size:44px;margin-bottom:14px;">🚫</div>' +
              '<div style="color:white;font-family:-apple-system,sans-serif;font-size:16px;font-weight:600;margin-bottom:10px;">Нет доступа к камере</div>' +
              '<div style="color:rgba(255,255,255,0.5);font-family:-apple-system,sans-serif;font-size:13px;margin-bottom:20px;">' + String(err) + '</div>' +
              '<div style="color:rgba(255,255,255,0.7);font-family:-apple-system,sans-serif;font-size:13px;padding:10px 20px;border:1px solid rgba(255,255,255,0.3);border-radius:10px;display:inline-block;">Попробовать снова</div>';
            startBtn.style.display = 'block';
          });
      }

      closeBtn.addEventListener('click', function() { removeOverlay(); if (onError) onError('closed'); });
      closeBtn.addEventListener('touchend', function(e) { e.preventDefault(); removeOverlay(); if (onError) onError('closed'); });

      startBtn.addEventListener('click', startCamera);
      startBtn.addEventListener('touchend', function(e) { e.preventDefault(); startCamera(); });

      function scan() {
        if (!active || found) return;
        if (video.readyState >= video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          if (typeof jsQR !== 'undefined') {
            var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
            if (code && code.data) {
              found = true;
              removeOverlay();
              if (onResult) onResult(code.data);
              return;
            }
          }
        }
        requestAnimationFrame(scan);
      }
    };

    window.stopQrScanner = function(containerId) {
      var sc = window._qrScanners[containerId];
      if (sc) {
        sc.stop();
        if (sc.stream) sc.stream.getTracks().forEach(function(t) { t.stop(); });
        if (sc.overlay && sc.overlay.parentNode) sc.overlay.parentNode.removeChild(sc.overlay);
        delete window._qrScanners[containerId];
      }
    };
  </script>
</body>
</html>
