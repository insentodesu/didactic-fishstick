<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Простой и понятный трекер личных финансов.">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Финансы">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2A4D3E">

  <!-- Разрешение на камеру для сканирования QR (mobile_scanner / getUserMedia) -->
  <meta http-equiv="Permissions-Policy" content="camera=*">


  <title>Финансы</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; background: #F4F1EC; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #F4F1EC;
      font-family: -apple-system, sans-serif; color: #2A4D3E;
    }
    .spinner {
      width: 34px; height: 34px; border: 3px solid #2A4D3E33;
      border-top-color: #2A4D3E; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div></div>
  <script src="flutter_bootstrap.js" async></script>

  <!-- jsQR: QR-сканер для браузера, не требует нативных плагинов -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>
    window._qrScanners = {};

    // Запускает камеру и сканирование QR внутри div с id=containerId.
    // onResult(code: string) — вызывается при успешном распознавании.
    // onError(msg: string)  — вызывается при ошибке доступа к камере.
    window.initQrScanner = function(containerId, onResult, onError) {
      var container = document.getElementById(containerId);
      if (!container) {
        // Элемент ещё не в DOM — повторим через 100 мс.
        setTimeout(function() {
          window.initQrScanner(containerId, onResult, onError);
        }, 100);
        return;
      }

      var video = document.createElement('video');
      video.setAttribute('playsinline', 'true');
      video.setAttribute('autoplay', 'true');
      video.setAttribute('muted', 'true');
      video.style.width = '100%';
      video.style.height = '100%';
      video.style.objectFit = 'cover';
      video.style.display = 'block';

      var canvas = document.createElement('canvas');
      canvas.style.display = 'none';

      container.appendChild(video);
      container.appendChild(canvas);

      var ctx = canvas.getContext('2d');
      var active = true;
      var found = false;

      window._qrScanners[containerId] = {
        stop: function() { active = false; },
        stream: null,
      };

      navigator.mediaDevices
        .getUserMedia({ video: { facingMode: { ideal: 'environment' } } })
        .then(function(stream) {
          if (!active) { stream.getTracks().forEach(function(t) { t.stop(); }); return; }
          window._qrScanners[containerId].stream = stream;
          video.srcObject = stream;
          requestAnimationFrame(scan);
        })
        .catch(function(err) {
          if (onError) onError(String(err));
        });

      function scan() {
        if (!active || found) return;
        if (video.readyState >= video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          var code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: 'dontInvert',
          });
          if (code && code.data) {
            found = true;
            active = false;
            if (onResult) onResult(code.data);
            return;
          }
        }
        requestAnimationFrame(scan);
      }
    };

    // Останавливает камеру и освобождает ресурсы.
    window.stopQrScanner = function(containerId) {
      var sc = window._qrScanners[containerId];
      if (sc) {
        sc.stop();
        if (sc.stream) {
          sc.stream.getTracks().forEach(function(t) { t.stop(); });
        }
        delete window._qrScanners[containerId];
      }
    };
  </script>
</body>
</html>
