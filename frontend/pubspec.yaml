name: finance_pwa
description: FinPet — финансовый ассистент с питомцем (Flutter PWA).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.2
  shared_preferences: ^2.3.2
  web: ^1.1.1
  http: ^1.2.1

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: YandexSansDisplay
      fonts:
        - asset: assets/fonts/YandexSansDisplay-Regular.ttf
          weight: 400
        - asset: assets/fonts/YandexSansDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/YandexSansDisplay-Light.ttf
          weight: 300
        - asset: assets/fonts/YandexSansDisplay-RegularItalic.ttf
          weight: 400
          style: italic
    - family: YandexSansText
      fonts:
        - asset: assets/fonts/YandexSansText-Regular.ttf
          weight: 400
