name: finance_pwa
description: Учёт финансов — простой и понятный трекер (Flutter PWA).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.2      # выбор файла выписки (отправляется на бэкенд)
  mobile_scanner: ^5.2.3   # сканирование QR на чеке (getUserMedia в браузере)
  shared_preferences: ^2.3.2  # запомнить, что онбординг пройден
  web: ^1.1.1

flutter:
  uses-material-design: true